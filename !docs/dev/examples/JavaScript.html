<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <title>WebSocket++ Echo Client</title>
  <style>
    body { font-family: sans-serif; margin: 16px; }
    input, button, textarea { font-size: 14px; }
    #log { width: 100%; height: 300px; white-space: pre-wrap; overflow:auto; border:1px solid #ccc; padding:8px; }
    .controls { margin-bottom:8px; }
  </style>
</head>
<body>
  <h3>WebSocket++ Echo Client</h3>

  <div class="controls">
    <label>Server URL:
      <input id="url" type="text" value="ws://localhost:55202" style="width:300px"/>
    </label>
    <button id="connect">Connect</button>
    <button id="disconnect" disabled>Disconnect</button>
  </div>

  <div class="controls">
    <label>Message:
      <input id="message" type="text" style="width:300px"/>
    </label>
    <button id="send" disabled>Send</button>
    <button id="clear">Clear Log</button>
  </div>

  <div id="log"></div>

  <script>
    const urlInput = document.getElementById('url');
    const connectBtn = document.getElementById('connect');
    const disconnectBtn = document.getElementById('disconnect');
    const sendBtn = document.getElementById('send');
    const msgInput = document.getElementById('message');
    const logEl = document.getElementById('log');
    const clearBtn = document.getElementById('clear');

    let ws = null;

    function log(...args) {
      const s = args.map(a => (typeof a === 'string' ? a : JSON.stringify(a))).join(' ');
      logEl.textContent += `[${new Date().toLocaleTimeString()}] ${s}\n`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    connectBtn.addEventListener('click', () => {
      const url = urlInput.value.trim();
      if (!url) return;
      try {
        ws = new WebSocket(url);
      } catch (e) {
        log('WebSocket create error:', e.message || e);
        return;
      }
      log('Connecting to', url);
      connectBtn.disabled = true;

      ws.addEventListener('open', () => {
        log('Connected');
        disconnectBtn.disabled = false;
        sendBtn.disabled = false;
      });
      ws.addEventListener('message', (ev) => {
        log('Received:', ev.data);
      });
      ws.addEventListener('error', (ev) => {
        log('Error:', ev && ev.message ? ev.message : ev);
      });
      ws.addEventListener('close', (ev) => {
        log('Closed (code=' + ev.code + ', reason=' + ev.reason + ')');
        connectBtn.disabled = false;
        disconnectBtn.disabled = true;
        sendBtn.disabled = true;
        ws = null;
      });
    });

    disconnectBtn.addEventListener('click', () => {
      if (!ws) return;
      ws.close();
    });

    sendBtn.addEventListener('click', () => {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        log('Socket not open');
        return;
      }
      const m = msgInput.value;
      ws.send(m);
      log('Sent:', m);
      msgInput.value = '';
    });

    clearBtn.addEventListener('click', () => { logEl.textContent = ''; });

    // allow Enter to send
    msgInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); sendBtn.click(); }
    });
  </script>
</body>
</html>
